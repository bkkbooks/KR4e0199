body:
  text: 山海漫談别集類五明提要臣等謹案山海漫談三巻明任環撰環字應乾號復菴長治人嘉靖甲辰進士厯知廣平沙河滑縣遷蘇州同知以禦倭功擢按察司僉事整飭蘇松二府兵備道山東右㕘政事蹟詳明史本傳是集為其鄉人庾璵所刻凡文二巻詩詞一巻環禦倭頗著竒蹟當時皆以為賞薄不足酧勞其遺集久散佚其子孫搜求輯録所得不及十之一仍名曰山海漫談從其初也其文既得諸殘燬之餘故有見即收不暇銓擇多潦草應酧之作然就其存者論之古文皆嶄嶄有筆力且髙簡有法度其中如蘇門雙節記重修白雲茅屋記重修文廟祭噐記啟明山先生書雖不免㕘襍俗格至于送蕭西泉朱蒲西二序徳風亭滑縣行館二記與王南崖荅王東臺二書皆絶非明人文集以時文為古文者雖置之作者間可也詩如槎泛星河秋作客劒横滄海夜談兵之類亦間有可觀而冗俗者多則其後人編次失于刪汰之過也然環之為人無愧忠孝亦不必以韻語䋲之矣乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b5ac62be463bc3638bb0b9bca9f0be3512412fc1dfc12af2fbbddb463a5a9f55
