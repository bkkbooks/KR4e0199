body:
  text: 山海漫談卷一明任環撰送蕭西泉之令榮河序西泉子陟尹榮河將之任揖余而問政焉余惟天下之生困􅉵極矣而晉為甚其地狹其民窘其賦厚而庸繁其饑饉洊臻比流冦亟犯其䆒也逃逋相望閭閻為墟其老弱疲癃存十一於千百則又皆愁嘆悲號於荒村廢屋之間面其色可蹙額聆其音可涕而泣也西泉令于兹感于兹將必有大戚於其中者矣其忍不為之所乎夫朝廷張官置吏而慎守令謂其於民有父母之責者也守令有父母之責則郡邑之民皆其子也今夫人之於子疾痛疴癢靡弗相關至於百姓則漠然而不之顧又其甚則或有不可談者是何愛民不若愛子謀國不若謀身哉有達於此者可以言政矣西泉少以孝謹聞於鄉尉滑之四年視駉有成績與之語訥訥若不出諸口考其政暗然不事表暴而蔚有口碑在滑也夫求忠臣於孝子之門吾知其不負吾君矣焉有功加於禽獸而恩不及於百姓者乎以佐滑者而令之榮恢恢乎其有餘地矣是役也蘇晉鄙之民而康之使逋者來愁者歌上有賴而下有庇將不在兹乎異日紀循良報天子登崇階樹偉業必吾西泉子也吾於西泉有同官之雅重其行且幸吾晉之得人也因其請而樂告之如此云送朱蒲西之平遙三尹序滑臺朱蒲西拜平遙簿若有慮心請余而求釋焉余曰慮者何也蒲西曰吾聞兹邑地瘠而近邊民悍而喜訟且簿小而事煩督之者衆而動若有礙也余曰君知慮哉遙民之惠也然余請破君之慮慮君之不慮可乎今夫朝廷懸爵祿以馭天下之士不欲其綏民而理國耶然民之於官國之於家分異心同勢殊機一爾聞君事母孝撫弟見成立於前業有光其所以教家者彰彰爾矣推其心而達於政其於平遙裕如也奚其慮故地不慮瘠而政慮不腴邊不慮近而偹慮不素民不慮悍而使慮不體訟不慮健而聼慮不公簿不慮卑而職慮不盡事不慮煩而處慮不要督不慮衆而感慮不誠也君之事上也其以孝基之使下也而以慈廣之身其地而察其心其慮國事真若家事焉則上將愛君如子而下亦戴君如父母矣君之慮寧不及此哉抑又見今之拜官者於名邦則澤難施而人望之也重於下邑則恩易及而人責之也輕平遙之政有飢渴之望無覬覦之虞者也存此心而不失蒲西自此升矣將為君喜而反以為慮耶蒲西灑然為間曰得之矣遂書以為贈蘇門雙節序常節婦者蘇願菴之遺室李節婦者蘇介菴之遺室也兩菴悉豫之亡友而介菴者又豫兒之婦翁也兩菴俱業舉子有聲於庠嘗以秋戰之北苦讀一室而介菴又杜門不出以自勵焉嘉靖甲辰伯仲相繼而卒時二節之年俱在三十下各欲以身殉其夫解者曰爾自靖則得矣然虛舅姑之養者不孝棄人之孤者不慈不孝不慈何以見死者二節翻然曰是誠在我而以孝謹事其姑而以義方畜其子而以丹心苦節慰其亡人於冥冥之中而不少懈蓋十餘年來如聨珠合璧寶櫝深藏如老竹蒼松孤崖並秀常之子近遊庠李之子亦復森然頭角矣觀風者亷其風而重之扁其門曰雙節斯固來稱情之譽髙不朽之事者也鳴呼天之造物也淵乎其深哉始吾兩友之亡也孰不曰有志者不必成也而且尤天道之無知也自今觀之屈其身也信其婦也嗇其夀也昌其子也奪之彼也償之此也天於有志之士何嘗不厚也然猶未也機聲斷而真儒出荻管畫而相才見熊膽含而家聲振彼二三節婦固所以成君子之光而三氏之子又能世其母德之盛者也斯舉也吾為二節重而且不能不厚望於二節之子云重修德風亭記德風亭創自唐時李别駕屹立於上黨署後之崇臺蓋巍然西晉之大觀也嗣唐以來代有興作而本朝則自𢎞治間知州馬公而後無聞焉亭之敝也久矣嘉靖丁未夏右川孫公來守是郡再期而政化大行上下信恱乃於暇日起此亭之敝而新之且廣其臺而固以磚於亭之東西兩隅復構二亭焉左曰我闥右曰大觀左則公之自命而右則侍御漳野李先生之命也工始於己酉七月訖於八月鏹不告費民不知勞動惟厥時事成而不迫君子謂斯亭之役也有禮哉而或有問於豫者曰興廢政乎豫曰然將觀逰乎豫曰否蓋君子必先見天下之隱而後有先天下之憂必先大天下之心而後足善天下之政是故登斯亭也俯覽旁燭若盡寰宇則凡蔀屋窮愁閭閻竊嘆一民一物之不獲其所者入乎目交乎耳感乎其中將必有大戚於其心者矣故曰見其隱也先之而有憂焉由是而蒞德風則思善其感坐我闥則思廣其量對大觀則思普其照其轉愁嘆為謳歌而使民物各得其所者殆非偶然也故曰大其心也而政斯善焉是兹亭之立固勤民淑政之資耳豈曰觀遊云乎哉雖然公亦惟有是心耳蓋有是心則有是亭心因亭見初不因亭而後有是故不必居髙臨下而民隱自恤也不必蒞德風而鼓舞自神也不必坐我闥而八荒自囿不必對大觀而天下自照也然而必為之亭者公豈為後之來者設歟公以為來者之心不相繼風斯靳矣將使其顧亭之名而思義焉則庶幾上黨之民可庇永休耳於呼公之所以風潞者其深逺乎哉異日公秉洪鈞風天下垂青史而風後世又不過自其所以風潞者推而廣之耳余更秉筆以俟之乃若公歷履之詳諸政之善則有潞之口碑在及諸公之記已核乎其實矣余又何敢喋喋耶時維二府北山李公西瀾張公通府北泉陳公西園楊公推府許南牛公皆贊公之風而同庇吾潞者也義得並書以為繼公之後者告云百户孫氏先塋記是為焦家莊之原百戶孫公之墓也其左右壟所列者則公之子韜禮及孫英雄勇也公諱隆其先揚之泰州人父旺從太祖北討有功授揚州衛指揮降陜西狄道千戶所千戶改山西潞州衛左所百戶卜屯於直𨽻肥之倉坊堡焉公少負竒氣驍勇不羣及代父職有萬里擊攘之志正統間從征卒於陳上恤之詔封昭信校尉韜代卒其子剛幼禮實公之次子而代之及長而還職焉剛生吉吉代而生通於公為大宗而所謂英雄勇者則禮之三子也英生諒洪海聚寶雄生堂鐸景鉞勇生淵慶鸞果鳯嗣是而下如碑隂所紀者蓋振振然皆禮之後而於公為别系也由勇而上葬於此者其塜六以從祖也自剛而下卜於屯者其塋三以就桑梓且兹兆頗隘殆有所不受也堂之子針念此逺於井里而恐其湮於榛莾也嘗以記命其遺孤庠生登登早卒其弟庠生雲於余為戚友乃成父兄之志而問記焉余惟古道日逺反本風微世有委墳墓於人西階之下而不恤者君之父子宅心如此可謂加人一等矣抑余於是而得數善焉是故以從討者觀其忠以死陳者觀其勇以代襲者觀其義以還職者觀其信以無忘其先者觀其仁以善繼父兄之美者觀其孝且弟諸善畢集而子姓之盛不與焉則孫氏之門其所以致此者固自有道矣竊願爾來者深鍳前休光於爾祖使丘壟與太行爭髙此則立記者之深意也反是而自毁孝思殞厥令譽俾爾墳墓間有慚色豈我之所敢聞滑縣行館記滑去府二百里許縣官以公至者多假宿琳梵有時盡為先客主往往停驂康衢問僦民舍至則吏人雜處上下無章余深病之嘉靖辛亥夏白太守張公易元城隙地建屋一區為行館焉南面城東西臨道北為生員李杲氏作堂作吏室作皂房作庖丁所既竣而來居若赴家然上下裕如也或謂余曰子客耳而奚慮之深余固以為來者慮而奚必於余哉獨念吾儕號為祿食而尚或艱於所往則下乎此者可知矣是故君子之為政居則令其有家行則令其有旅匹夫俱獲斯已矣僕病未能也因漫書於此與後之君子共朂云重修白雲茅屋記雲屋在滑臺之南堤祭酒宋先生所居之别墅也先生之歷履行業具在史冊屋久成墟不可復識正統間司土者禱雨於此有徵因為龍祠今亦傾圮惟斷碑存焉嘉靖庚戌夏仁和張公來守魏郡重道憂民為畿輔先時先生之後有以興復雲屋請於公適環來令滑公謂環曰興廢令之事耳且先儒之迹與建祠者之意均不可廢也子盍圖之環受命乃鳩工聚材卜日而並營焉方畝中分周垣以繚西建雲屋東作龍祠外各為門中各為堂四楹左右有軒各如其堂之數扁其祠仍舊軒曰思霑曰作霖雲屋之扁曰文恪草堂軒曰卧雲曰棲霞始於是年九月己酉越三月告成暇日與客登是祠仰臨丹霄俯瞰碧潭翛翛乎有凌雲駕空騰百川而潤九野之意及登草堂覺地逈天髙風清月白先輩典型儼或如見則又有懷古私淑滌蕩塵襟而適獲我心者焉嗚呼士君子之於世出處何常惟義之歸是故其息也不可無所養而其出也不可無所為斯二者皆取諸𠂻不假諸外然亦必有感而後動如此祠此堂是也後之登臨此地者其無忘所以大行自淑之心哉又告於宋氏子孫之業儒者曰爾其克念祖德紹於前休由憂違之操而思龍德之庥俾進為名臣退為善儔是不負今日之意而此地為不朽矣苟徒視為觀美而有司者又因為宴㑹之止則斯役也悖道爾殃民爾豈獨虛太守公之盛心而秉筆者甚不樂聞有此也師莊鎮重修義勇武安王祠記王之忠義在當時威靈垂後世而其祠宇遍天下所謂不戒以孚因義而起者也師莊之祠吾不詳其始其在至正重修者則殿四楹東西小廊各三楹門如其殿之楹嘉靖甲辰鎮人郭大儒建危樓三楹於其東擇僧紹雲捐地二畝給而守之戊申之秋祠遭回祿大儒曰是不在我乃協李龍倡居民輩出所有而重修焉殿視其舊而增宏門視其舊而增髙西樓視其東而增楹像貌有嚴丹青煥發神足依慿輿衆可仰工始於乙邜二月訖於戊午三月或有問於余曰祠災數乎曰然神不在兹乎曰否樓東危木盛斯火矣建西金以制之今而後其免夫翼拱於中惟其永圖耳不盡其人而窺神者否也抑王心事如日懸天其視老瞞不啻腐鼠故能參天地震華夷歷終古而不朽事王者敬王之貌而不心其心則吾未見其有能享者矣大儒之子庠生克道問記於余蓋不沒其親之善而凛乎有畏於王之心故為是說以記之重修文廟祭器記上黨孔廟祭有器也創自國初而大偹於馬侯州守之日嵗久殘缺主者多因仍之嘉靖丁巳唐山祝公來刺我邦治民事神純尚孔氏謁廟之始大懼器物放失曰是非所以報本始尊吾道也維時乃新之陳其帷幄以崇嚴也修其簠簋以盡慤也偹其百物以致享也戊午仲春上丁禋祀忠信而行要之以禮君子曰觀於大夫而致治之道裕如也夫禮有情焉有文焉偹物享者其文明忠信行者其情深情深而文明德博而化光矣推之天下其如視諸掌乎而何有於吾黨二三子其尚由公制器之意以達公不言而化之心藏器於身待時而動如公之所以教吾黨者教天下得矣公諱天保號鳳石起家丁未進士美政不可殫述兹特其一云止碑書與沙博王南崖前日以建碑之說相告環力止之而先生未及深信朔日謁廟見其所謂碑者已橫於地矣睨而視之心大不快夫唐虞以上無碑三代有銘戒要皆自警之詞耳惟秦漢以後之世率建碑以頌功德然尚核其實當其名皆卓然有可紀述而不徒加災於石也何近世以來殊異往昔輸錢構屋動輒鐫銘豐石文詞過為稱美其功何功其德何德且後世功德之盛又何多於三代以前之世也耶即今之所謂建碑者非以明倫一堂之修名宦鄉賢二祠之立乎然堂之修樊振增之二祠之立申從仁王天經創之彼固沙河之民治沙河之事耳於環何有哉非其有而有之是謂貪人之功為己私矣不意有司貪心之不止而顧及於小民之功也是亦不可以已乎或曰君大夫舉事則必書子亦從政之列也以碑紀事安足辭環竊以為不然夫舉事必書謂不分其舉動之美惡而悉書之以示勸懲以昭來世也今環竊祿於沙踰年矣豈無可舉之過乎是故衝瘠流移之民而環不能招撫之碑可書也而不書長途迎送之苦而環不能調停之碑可書也而不書禮教未興風俗薄惡刁詞橫起賊盜時出而環不能化導而清理之碑可書也而不書夫略其所可書者而不書則警戒之道衰而無可書者反書之則張侈之心盛是此碑之立未必不為平生之纍也况使後之繼至者必將指環之名而議之曰某也碌碌若此而碑記之則凡可以如環者皆可以得民之頌矣而遂阻其向上之心則此碑之立不獨纍余而且靳後是可以為訓乎誠使諸生登此堂而知明其倫進鄉賢而知仰其德吏兹土者入名宦而知警其官則碑雖不立固非缺典其或反是則堂祠之立亦文具之虛耳吾如碑何哉况擅立之禁國有明條而過情之譽士所深恥惟照諒而中止之則環方寸之中當為先生刻感德之碑也如何如何答張㠠山書年來奔走黃塵守溟海日惟猿猱對壘魚鱉是見想君子顔色邈焉神馳欲把手談心以道睽違之苦直是無由惟於北來縉紳口中聞盛美日益新又諸臺騰牘數鴻猷揄偉績必以兄為稱首則又未嘗不躍然喜杳然慰也夫勳業基之心術名位定於人品幹濟質之才華以兄古道純心髙才厚飬即近如取彼渠凶類之拾芥所以當大投艱聲色不動者氣量固已見於此矣異日銘鼎鐘垂竹帛以鳴國家之盛而流千載之光者兄也滑之治行云乎弟不佞不能蚤見預待而使東南震動邊境且有大憂時九死一生自分骸骨無可收者况有他望賴諸大夫士實惟我皇之威刋夷首復宇疆雖沿海近為底清而獸蹄鳥跡所以傷中華之太和者居多罪恐無門恩叨出格覽報伸舌縮項愧汗浸淫下矣夫薄功而厚享力小而任重肝腦萬夫而華腴一已是敗之府而厲之階也所關雖微或者弟知免乎哉夫受德而不報非忠也臨難而自諉無勇也安危利災知進而不知退者弟之所不敢出也時事稍寧即當索我於紫團之巔漳水之滸不然蹈東海葬枯魚以答君父之恩耳此身之外何有哉曩在邑時穢政種種今思以易之其道末由因一時之快意可略也而後世是非之公可畏也惟君子秉春秋之筆直書其惡不以故人私宥之使來者得有所考且有所懲則國家幸甚時在上海得兄書與貴鄉及諸同事者覽觀之弟自幸為大朋之錫而上令感不遺之情諸同事者又皆恨識荆之難也使旋謹此奉謝兼伸下悃北眺雲林情何能極伏望加飱以慰羣情萬萬答王東臺書閩晋人豪山斗天下伯仲如公又名邦之所山斗者環嘗讀其文慕其人以為生幸同時無由促地近於滁水何意登龍傾蓋談心沉酣至教感慰無量來安道中更辱手書奬借過周誘引偹至公之於人交道之不汚相愛之以德真當於古人中求之環何幸而獲此於左右也夫環未死人也忍情抔土絶裾髙堂多病殘軀有息槁木真泚顔汗背浸淫四下於長者之前矣顧金革之命義不敢辭犬馬之愚分宜自盡然而時事之難則又不敢不預言者夫東南之患何異七年之病哉夫去七年之病則非三年之艾不可也今之命醫者曰速已之速已之醫取必於嵗月之逺而無旦夕之效則曰是庸醫也怒而逐之致使盧扁在旁莫敢伸手强而促之烏附一湯主者洞下吁亦危矣彼盧扁者豈不知緩治之為功烏附之速害顧勢有所迫法有所不得施利害交於前是非眩於中求免之心勝則體病之念荒矣今之虛江今之所謂名醫也其察識之精運用之妙緩急標本之宜調理攻治之當皆自得於方書之外而取試於屢服之驗者也惟盡其所長不促而眩之使醫適於藥藥適於病焉耳虛江之醫環知之環輒逢人而道之亦如虛江之所以重於公者而重虛江但未知用醫者肯能不促而眩之否環亦受成於人者也以環與虛江事相類故在乎我者吾盡之其不在我與不在虛江者有命存焉或曰用藥之道醫治三已治七元氣不培而責效於金石草木之微此得之彼失之暫瘳之必復之吾未見其為完人也環嘗以為名言不識公以為何如率爾談醫不覺瑣瑣惟公進而教之且不以語諸人幸甚啓明山老先生書環猥以謭陋叨辱恩知拔泥塵之中置雲霄之上雖曰乾坤大造本出無心然而桃李枯株頓回春色鄰封竊尹幸覩龍光沙邑看符迭承心誨感恩何既謝德無由方圖日侍乎門墻詎意變生於旦夕椿庭萎而憂訃東來遊子悲而匍匐西返未緣辭候兼濶省裁芹曝空懸信愚童之寡昧鳥魚任適覺天海之優容日者闋餘春初北上伏逢途次兼領教言佩服何止於書紳欣躍頓忘其為客匆匆告别忽忽逾時南望雲林不盡瞻仰恭惟我明翁尊師台下學負天人道存經濟帝心簡在朝野聲流蓋將大授以調元故先歷試其勤隱師台日近相業行占慨元氣之難扶定煩國手惟老醫之用藥應借參苓如環菲材願充下劑起凋殘於一二敢負兼收倘積貯於箱囊終存本性維兹風便肅此問安如縷下懷率爾未盡伏惟台鍳少宥疏狂更乞珍調永申天眷環無任仰祝之至延沈西賓書蓋聞學必有師養正亨童蒙之吉易子而教責善全天性之恩不有開先何以覺後敬惟秋元沈大人門下家傳心易道足師資邇嘗小試崑山預卜大魁天下行中求我惟德有鄰鄙本疏慵素寡義方之訓兒俱長大又皆朽木之材敢屈髙軒敬延西館鼓春風而振桃李粧㸃門墻沛時雨而育菁莪成就德器入則孝出則弟豈曰文詞誦其詩讀其書將求實用謹占十二之吉奉枉文旌外陳不腆之儀先代修脯百惟惠肯無任慰詹軍中寄子書我兒千言萬語只要我回衙何風雲氣少兒女情多耶倭賊肆行毒害百姓不得安寧我領兵在外不能誅討嚙氈裹革此其時也幸而無事與爾相安於太平做個好人一有意外之變則臣死忠妻死節子死孝大家成就一個是而已山海漫談卷一
