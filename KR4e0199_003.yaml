body:
  text: 山海漫談巻三明任環撰五言律衛津别意送蕭四泉衛水秋空霽仙郎别棹移懸知西土慰應動滑臺思仗劍寧辭酒臨岐且賦詩晉雲猶未逺傾耳聽鳴絲别栗健齋二首的發當何日孤踪寄逺城念歸良獨苦聞别不勝情野渡留江艇風烟款客程知君懷繾綣湏我一杯傾客晤何曽乆他鄉却忍離君能開好抱我亦不相思隴樹雲千里江門酒半巵山川從此隔魚雁莫教遲哭歸孝子嘉定生員名守正迎盜思安母狼心未轉移黃塵猶乞免白刃已甘隨飲恨應憐父傳家豈待兒何當梟賊首為爾復讐私道中即事杯酒酌江天風晴日可憐危橋平地出孤塔半空懸石缺烟雲補村虚草樹連誰家蘆蕩裡撑出小漁船上嘉定城隍有序大兵之後加以亢陽民不聊生甚矣環入邑即禱神前累日不應豈誠之未至耶將風雨之權各有所司雖神亦不得而專耶或環之罪過深重為天所厭雖神力為之解而不獲所請耶然環之罪自當罪環而固不當以之累民也神之於此俱有民社之責今坐視其災而不為之救其與環之蠧政殃民者等耳曽謂聰明正直如神而顧肯如是哉鄙誠見乎小詞願以轉聞天聽早垂甘澤以起彫殘若環之罪過自甘萬譴神其聽之戎馬長驅後何當旱魃連火雲空片片雲澤竟𤣥𤣥却負蒼生望還期大有年也知誠未至神不為予憐庭穴蟻何處長空燕不來正湏潮濕礎又見月盈臺汗背翻成雨勞心已作灰何當瞻拜際一洒潤蒼苔西雲不作雨東起亦成空水落三江外民憂四野中天心真黙黙神聽却聰聰願以狂生齒將來換歲豐戾政干陰譴招災自有因要知狂子罪不在細民身神奉天誅賞靈來雨海濱但令彫瘵起還作十分春金山九日佳節逢重九孤踪寄海涯自憐猶墨綬多病已黃花欲問南來雁那堪此際笳夜深眠不得移枕聽慈鴉七言律賀李八泉同年拜南臺侍御花封尚憶甘棠客繡斧終持鐵面郎塵浄紫衢驄振野聲流金闕鳳鳴陽赤心片片酧天子公議明明列諫章寄語狐狸深莫避埋輪原為去豺狼代人勉諸生二首用宋萃夫韻學業難成貴強之機非由我更由誰但將百倍功能到縱是中材氣也移黃巻髙談仁傑案青燈深墨范生帷丈夫努力湏年少老大徒悲較已遲讀書湏讀沒書書活水源頭趣有餘莫向口頭求強記要於心上得安居養成良賈深藏器便是清朝大載車體用一原吾道在聖賢名教豈傳虚徐山人青囊未識已驚迴翻憶當年事可哀藏玉有城依祖去尋龍無處覔君來離宫寸地培餘廕坎首分金空木杯但願清風寒徹底不妨身卧首陽臺題人扇景不向江頭作濟船却來山下卧雲烟栁陰礙日吟風細草色侵堦帶露妍豈是偷閒消白晝秪因囘首識青天年來塵夢多驚險休怪先生抱石眠觀河昔年聞說黃河險此日孤篷冒險來地湧狂瀾風雨驟天驅驚浪虎龍催源開星宿當何處水到滄溟定不迴日暮潮生迷彩鷁安流時仗濟川材道中䇿馬山頭幾逐馳放船江上轉危疑長途險作三千里一日愁生十二時佩劍漫隨淮浦月望雲空憶草堂巵年來歸興濃於酒况復秋風動所思别史鶴峯冰壺秋水絶無疵傾蓋論心兩不疑海國雲深春送酒江天月白夜談詩轉官見說還台省别客那堪此日時公到廟堂應問及東南時事莫深詞海上停舟風雨連朝有作怪雨驚風冥不休潮來汐至總深愁糊塗日月歸樽酒潦倒行藏付短舟大造幾時分霽色浮生何處覔安流乘槎泛葉者誰子任爾飄然物外遊寄南岑晉水吳山路𣺌漫幾於清夜夢相看天邊落雁千金重先有書故云海上驅兵六月難髙㑹乆虚王子席浮名何用大夫官斗南日日頻囘首目斷秋空意未䦨海上夜征次解都閫雨餘伏枕聽潮聲不寢因憐月色清槎泛星河秋作客劍橫滄海夜談兵初陳雲鳥三軍陣已奠江山萬里城夷窟分明消虎豹東南依舊見承平寄張㠠山旅邸相逢惜别筵江南江北杳經年琹張流水黄池月劍挂秋風白馬天君有奇才消異變我無長䇿浄氛烟塵愁離恨知多少獨立荒臺正惘然九日九日有臺登不得一官於我竟何為病憐黃菊人千里愁對西風酒半巵潮退小橋分亂水霜嚴寒鳥擇深枝悠悠世路空南北兀兀江頭且賦詩和張石川野航之作蘆花汀畔獨移船一曲滄浪興杳然已付世情流水外遂令心事老江邊魚吹細浪侵書帙燕落香泥綴酒筵便與先生甘訂約乘槎直欲訪青天大栁道中大江東去日西流匹馬衝寒役役遊千里山川原夢幻百年身世自萍浮萱堂月冷霜華滿滄海塵埋蜃氣游運甓有心烏怨在朔風囘首倍離憂代人賀門生進學喜爾遊庠為爾憂幾畨憑日費心籌三軍重敵着孤劍萬里驚濤藉短舟戰罷太平方是福渡時安稳未為休泮池一竅通蟾窟折桂還湏到上頭絶句和仇雄川幽居十詠掃室風塵遍海涯一室焉能掃帚柄願持來廓清天下好焚香地僻青山擁人間白晝長草堂無箇事終日瓣心香讀史淳風悲日短天意竟何如怕到澆漓處令人長嘆吁滌硯蕩漾前溪水萍開自不妨蛟龍吞作雨𤣥澤滿天香觀畫霜綃纔半幅描冩盡中華城郭山林裏窮愁未有涯鼓琴瑤琴空石几腸斷未成聲聽待他年鼓熏風指下清移榻松濤度晩風泉竇流閒月移榻對天光不知清興發養花種筠酬彩鳳栽樹養甘棠更欲葵心吐山居鎮日忙酌酒嚴冬風力重寒谷鳥聲幽把此太和春願分天盡頭烹茗掃雪撼庭梅烹茶折檻竹清生腋底風香潤林間屋冠昨見爾蓬頭飛飛亂於草網網一束來今日方看好字淑徳歸清議華稱亦大箴願言思義處深顧命名心挽黃節婦清血流天地花軀老甲兵野塘巖下士乃夫也一日遂知名冠今古大經敦首禮聖賢名教責成人修齊自是男兒事頭上休空負此巾謝董千兵面藥顔面増光感徳深從今塵垢不相尋年來也偹些兒藥暗室時時學洗心壽人七十紅塵飛不到心頭七十年來真自由醉數又來花甲子蟠桃三熟是春秋劍霜刃稜稜星斗寒玉樓生粟幾囘看萬人學敵渾閒事只有心兵克退難夜訪鄭顛仙仙子雲巢駕碧臺市城深隱即蓬萊𤣥關不惜山人扣夜半應驚鶴夢囘海上漫成二首蓬影翻風弄酒杯浪花飛雪㸃書臺一聲鼔角魚龍動天黨山人駕海來枕上時聞風雨聲蓬飛天際一毫輕不知聲在孤懸裡却為旁舟作險驚示爾孝等二首昔年走馬燕山道今日驅兵滄海涯三尺龍泉書萬巻丈夫何處不為家放船中道轉狂風雪浪排山一㸃蓬燕寢先生明旦死驚危不在海濤中兒輩莫愁人生自有天數惡滋味嘗些也有受用苦海中未必不是極樂國也讀書孝親無貽父母之憂便是常常聚首矣豈必一堂哉呵呵送人還鄉海上扁舟一葉輕春來送客不勝情到家阿母應相問只道江南已太平志感遙憶當年痴小時纔離跬步即相思而今落魄滄江外囘首憐兒更是誰西山道中馬蹄踏破白雲鄉囘首關山頓轉傷勞我浮生長是客迷津羞問釣魚郎壁鷹海上何年摶猛氣人間不解有雄禽短墻却礙冲霄翮萬里空餘搏兔心古風書程近齋軸送蕭侯之榮河尹程君手持送行軸中有題詩畫半幅問之乃云贈蕭侯勸我一言相頌祝君家詩畫品絶工安能為蛇復添足中世士夫不好古動輙相先餽金玉廣文先生獨雅致開巻風烟生滿目缺巖高樹隱孤城流水荒村見茅屋中間遐想菜色多静聽如聞有野哭蕭侯尉滑知民艱榮民更比滑窮獨此去應調玉律吹轉見陽春發寒谷拾椹春行孝孝何如柔桑滿道結子殊黑者奉母赤自食狂賊見之心惻惻蹄牛斗酒何足言要知誠意能感激嗚呼孝哉兮令人悔親在逺遊拾青紫拾來不及泉下人青紫何為淚如雨扇枕夏行孝孝難比黃香時尚為童子酷暑庭幃親汗流一扇中揮一片秋而翁有子鼾睡穩扶持清夢日髙頭嗚呼孝哉兮恨何說多病萱堂時執熱青葢翻然吳楚遊猶向虚亭乞冰嚙懷橘秋行孝孝堪賞陸卿心在親身上洞庭佳實落塵埃主人相顧真異哉卿家誠孝自感動香生滿袖親顔開嗚呼孝哉兮痛罔極江南風味羅前席嘗新不及到親旁却與妻孥相對食泣竹冬行孝孝尤異長哭一聲動天地湏臾玉笋生滿林歸來作羮慰親心沉疴脱體灑然愈芳聲千載重南金嗚呼孝哉兮我知愧親卧髙堂思逺味如何不將寸草心却持老竹班班淚乙夘之秋奔母䘮也悲化者之已徃恨孝養之無及追思古人各舉一事畧加數語以自恫焉其所謂四節者亦偶然耳又拾椹之事或當春夏之交此固不必深論也嗚呼數子髙風邈焉難及事親者其尚及時自盡其心無蹈予之覆轍哉代人賀栗裕泉秋薦八月既盡九月始拱聽秋雷方側耳天涯忽報㨗音囘廣寒髙步獨吾子初聞大喜復大驚上黨名流多俊英鹿鳴與宴常三五稀奇却為鄉邦撫文章豈不動朱衣消息盈虚各有時交輝聨璧看來歲磨刮工夫肯忘之始為驚兮終復喜屈伸相感本常理屈伸相感自諸君天獨伸君意有主所以登雲獨使照閭閻多廢屋所以折桂獨寒香欲遍人間馥明春更占鰲頭獨經濟謨猷添衮服願爾立朝同丹𠂻對主獨分官為政同真心為民獨宦海波濤中砥柱巍然獨急流順意中䌫住扁舟獨始終獨立衆人中不負當年學慎獨我本謭陋才不識周孔陸所懷一得見獨為知己祝文詞惜未工意亦良已篤讃漁樵耕讀四首明月扁舟蘆花淺水魚無深愁漫興而已雲山砍破挑此一肩留彼新松以待叅天一犂春雨萬頃秋風擊壤而歌伊誰之功刺股懸梁囊螢映雪達之思兼窮亦歸潔詞代謝二尹送張立菴入覲有引花封出宰九重恩澤入人深金闕朝天三載勲猷稱治最廟堂増重黎庻交懽恭惟台侯秀孕秦川粹鍾華嶽經窮墳典唐虞廷上得心傳學有本源關陜門中分正𣲖文藏八斗氣吞五湖步萬里之雲程早扶鵬翮破千層之桃浪連奮龍頭葢將大授以留中故先小試而補外琴張百里絃歌聆天黨之音錦製一方桃李動春風之色魚懸白日鶴舞蒼苔心事凜於冰霜政聲得之謳頌剪除豺虎小人大畏而改行扶植芝蘭君子得恃以無恐謠張君之為政樂不可支恨亷范之下車來其何暮上嘉下樂實大聲宏品題乆重於台章名姓應留之御屏時維三載九重當入覲之期節届初陽雙舄正北飛之際閶闔大開乎宫殿衣冠深拜乎冕旒龍虎相從地天交泰想清夜之前席應問蒼生諒曲江之陳謨定開金鑑某等叨陪仙仗猥辱恩知壯此行之應寄調元曷勝忭慰念吾儕之難留乆庇殊切懷思聊唱驪歌以侑祖爵詞曰山亭折栁携君手離思濃如酒二天人逺霜寒雪凍誰能禁否琴鶴蕭然囊無餘物奏草懷中有此行看取霖雨蒼生功名白首右調賀聖朝代人壽岳翁八十冠帶有引骨本仙裁誕惟岳降壠雲耕斷早年寄心事於丘園溪水釣開壯志傲烟霞於湖海半塵不染一葛無求松石醉眠竹枕悟醒浮世夢山泉渇飲桃花尋入洞天春不爭若老子之居周大觀法莊生之處世生涯風月鷗友忘機活計詩書麟兒育種識髙養盛身屈道光葢惟静極有常是以仁人多福維茲初度已臻尚父之期况沐殊恩出自清朝之典榮添海屋喜溢桃花桂子蘭孫舞蹈階前尋至樂青衫鶴髮綺羅筵上飫天真葢誠福壽之兩全而卜算之未可量者也某恩沾半子望乏乗龍愧無雲石之聲難𢋫鶴曲敬効凾闗之獻聊侑霞觴詞曰堂開烟外緑野輕寒退清晝永祥雲靄春風蕩簫鼓淑氣邀蓬海更有那青禽黃鶴憐相對北闕恩頒賚白首青袍帶屈指處誰能再俊聲歸大老眉壽齊華泰凖備著安車穩上磻溪載右調千秋歲代謝二尹賀張立菴受奬有引鳬飛天黨方看經濟之才豸識人龍已見旌揚之典山川動色僚庶増光㳟惟台侯三秦間氣一代偉儒學扣唐虞之心天人抱負道傳關陜之脉山斗文章奪魁走馬於雍西香分月窟射䇿看花於冀北春占皇洲帶囘金闕之恩光布作山城之和氣丹心懸白日普照無私氷節凜秋霜半塵不染鶴閒清晝一簾草色弄庭前琴鼓薰風三月春光囘谷口諒龔黃之盛美難專於前信伊傅之奇勲托基於此惟其下安上信是以寔大聲宏名動烏台褒移霜檄原君子之立政本出無心惟大人之觀風事如有待行看累薦牛刀難屈於花封佇見喬遷豸斧終持於清代某等叨隨文從竊沐恩私慶盛典之躬逢聊裁頌曲念攀留之難乆不盡思歌詞曰關西人傑有對日丹心凌霜老節鵬起秋風龍騰春浪早歲聲華奇絶多少蒼生命脉些子王章機訣全仗賴有脚陽春無情冷銕堪悅真箇是民困方蘓百里絃歌徹子厚情思九齡風致才望齊賢並列休羡名髙豸府更看聲流龍闕有時節鳳詔飛來岩廊調爕右調喜遷鶯代人賀周指揮稱號晉野有引天黨奇才瀋邦名佐金章紫綬早年承雨露之恩鐵㦸銅符壯志負干城之望博通諸史嫺習六韜胷中有數萬甲兵武能弭亂麾下看三千禮樂文足經邦内外藉以無虞王朝因而大治春閒虎帳棋聲壺韻散餘清風静龍旄擊玉敲金還自得一時賢士樂與交遊三晉鄉評翕然歸重稱其德則不忍及其名敬其人此所以加其號命之晉野允合輿情播之聲華將求寔行葢瞻太行則欲髙其忠望漳水則欲下其澤稽唐虞之故址景仰方深覩千里之長封屏藩在念以至西北强侮聞之可以知外防閭閻窮愁見之因以豫内備凢此皆命名者之微意而先生之所當深思者也某等乆辱深知曷勝感仰躬逢盛舉聊奏聲歌詞曰雪花飛入朱簾裡錦堂一𣲖笙歌委瑞氣滿髙筵濃香送酒船晉野誰程號聲華從此茂顧名思義時東君知未知右調菩薩蠻代諸生賀程近齋受奬有引鴻儒振鐸喚醒千古之䝉豕野傳經綿衍吾道之緒聲流畿輔價重蘓湖旌嘉交動乎霜台光彩倍増於芹泮揚由實感道與時行恭惟台侯名震越流家傳伊𣲖十年螢雪養成間出之才萬里風雲未㑹平生之志成均卒業豈曰深酧獻序分官竟云小試葢上天有意於斯人故東郡能來乎君子春風滿座門墻桃李屬吹噓時雨一天洙泗魚龍從變化詩追元白文近歐蘓畫品精工書神古拙原君子之盛致不在多能而大人之旁通尤勤小物淤沱議水去思與遺愛俱深河朔校書佳績共芳聲日起邇承繡斧兼下旌書公本無心事應以類山川動而草木生輝文教崇而薦紳有氣誰云世態偏寒鄭老之氊畢竟人心尚仰韓公之斗某等宫墻外望成章殊愧於斐然典禮躬逢作頌遽忘其率爾聊成俚鄙用代絃歌詞曰秋月冰壺纎埃俱絶真個是風流人傑看他八斗深藏三江倒洩論聲華日星昭列秉鐸東州逺紹尼山命脉有多少游楊立雪眼見得鳳口銜書蒲輪動轍要先生那時正說右調鳳凰閣吳淞翻來覆去淋漓秋雨何時住江上兵船破浪衝鋒已半年祲氛未掃多愁不覺容顔老仗劍西風慷慨悲歌樽酒中右調減字木蘭花道中孤雲野水一聲長笛蘆花裡明月江天搔首西風懶待眠萍踪何處片篷飛下滄浪去子夜吳歌萬里征夫奈若何右調減字木蘭花别浦楊子黃葉翻紅葉翻行人歸斾出陽關天髙烟水寒别君難見君難從今留得夢中歡相逢知幾年右調長相思山海漫談巻三
