body:
  text: 山海漫談巻二明任環撰呈諸䑓掲即今浦東之㓂尚有三千焚舟結巢勢葢必死此當慎重圖之而不可易易視之者也今冬之患本自可虞而來嵗之防尤宜深慮調來客卒僅足五千而弱脆不堪又居其半審形量力審彼知己所謂戰不足守有餘者也督之過浦則主反為賓屯之重地則以靜制動得失較然不待明者為今之計宜於華亭上海嘉定等處各屯一枝休養訓練使虎豹之勢隠然在山仍選地方輕兵及山東箭手零擊刁勦多方誘撓迭出更畨使彼不得安息賊計窮困必將四散突衝然後乗機督發客兵擊之不出則守之但令内地無虞不妨遲以時日此則寓戰於守致人而不致於人萬全之道也若狃於近利急於成功率方至之兵攻必死之㓂犯深入之戒寡持重之謀萬一疎虞則來年之事去矣夫川兵之後猶有湖兵湖兵之後更將何繼此本道之所以日夜憂惕而一息不能自安者也夫東南之患何異七年之病嵗月培調則以為逺一旦强醫求逞於烏附巴遂之劑則主者洞下矣是可不寒心也哉伏乞毅然主張乘機後動使醫適於藥藥適於病遲速緩急各得其宜攻治調扶不至牽制去東南之積滯復天下之太和則國家幸甚生民幸甚師出在邇兵行尚謀言出血誠不敢隠諱請乞鈞照再呈諸䑓掲竊惟遭蹶者得便經過者長識本道庸愚不能力主永保二司之兵使之决不過浦致有元日之失青村之事又出意料之所不到至今痛悔無及即日諸㓂縱横千百羣出捉來奸細往往稱言過浦兩軍四散之後内無足恃之兵守恐疎虞况可輕進調來箭手千名雖稱雄壯然長技止於一射而地利况且未知此與山東士卒其名不同而其分數大畧相等東兵以三千之衆而不能勦賊於未熾之前邊兵以一千之寡而欲制賊於既猖之後此其不格不待明者况此軍原係防秋之兵而宗禮又係北來之将必湏萬全以歸始於國威無損若復輕挑速戾故踵前愆目下何以紓憂他日何以對上為今之計宜以此兵仍屯浦西以固内勢樊參將及各同知之兵分布浦内以防渡越海防道之兵併婁參將之兵及熊同知所督之兵相機發至浦東俱於賊巢之北周浦等處屯劄按伏刁勦把總陳習王應麟之兵仍各屯該所每日出兵一體設伏遇有新賊㑹同各枝先行追撃使賊不得合勢若舊賊流動或往西南則併力尾撃或侵犯渡浦則樊參將各同知之兵力行堵截宗佐撃之兵隨向遏勦仍行上海嘉定太倉常熟各該掌印官督率新招主兵振揚聲威以示有偹如此則以逸待勞賊不敗則走矣不得於此則得於浙不得於旱則得於水外此而欲輕試人命以圖難成之功復蹈危機又取日後之悔非本道之所敢再言也伏乞鈞照三呈諸䑓掲近聞江北之㓂將出長江松江之冦將出乍浦此葢聞大兵將至各思逃遁以求生者也夫倭奴之技長於陸戰我兵之䇿得於水攻此固部院之所洞察而亦用兵者之所竊窺者也為今之計合無行令俞總兵即将各總兵船量留防守各口外其餘福沙蒼船分為二䑸一䑸本官親自督至金山乍浦一帯一䑸委官督至崇明沙後一帯各按伏深洋不露形跡請乞大兵先於常州江隂之間大張聲威作為驅擣之勢則江賊必開而兵船之在崇明者或可收㨗矣南賊聞風必将併去如尚遲留仍請大兵由呉江嘉興照前聲勢則南賊不知為計而收全功者必乍浦之兵船也夫用旱兵之聲威則敵不知其所守運水兵之長技則敵不知其所攻此謂致人而不致於人之道也芻蕘鄙見率爾冐陳縁係軍情合行具禀伏乞鈞裁謝恩表奏為恭謝天恩事奉兵部劄付為㨗音事該本部題前事奉聖㫖任環䕃一子與做原籍衛所副千戸随軍殺賊欽此欽遵臣望闕叩頭謝恩外伏以天威逺震海洋收廓清之功聖徳𢎞敷草芥衍流裔之慶恩同大造報乏涓涘寵遇明時感淪肌骨恭惟皇上文武聖神剛健中正囿八荒於度内天地生成示九伐於寰中風霆號令蠢兹倭醜敢犯東南仰仗神謨旬日底定太倉海口方成斬級之勲嘉定江東復奏生擒之績烟消宿瘴凱聼旋歌事豈人為勝由廟算如臣犬馬下質衰絰殘軀逐隊隨行慙無掃蕩之畧因人成事方深鰥曠之虞敢謂寵榮被沾草木矧諸臣爵賞止及其身而臣沐天恩乃延於世再傳殊錫腐儒叨汗馬之勲千戸封侯稚子冒干城之寄此誠清廟之特典而書生之竒遇也臣聞命自天措躬無地捫心有愧揣分奚堪但門庭之患未除尚廑宵旰而臣子之心方瘁敢曠恩私臣當益勵初心勉圖後効晨昏教乳稚之子共竭葵誠金革銜烏鳥之私誓清海甸伏願皇圖嶽鞏聖壽天齊舞干羽於兩階咸寧萬國申丈人以三錫永奠羣黎臣無任感激懽忭屏營悚息之至為此具本專差舍人聞詩齎捧稱謝謹具奏聞陳情疏奏為仰仗天威倭㓂退息懇乞天恩容令終制以全子道以圖補報事臣因生母趙氏在家病故臣聞䘮連夜回籍外續奉總督軍務南京兵部右侍郎兼都察院右僉都御史楊信牌開稱留臣奪情奉此遵依竊臣一介草茅䝉恩作養叨中科甲待罪蘓松頃因倭夷犯順作擾東南當事諸臣檄臣驅勦臣自受檄以來夙夜兢惕深以不獲討賊貽君父南顧之憂為懼猶幸出師㣲有斬獲是皆仰頼天威顯靈廟算𢎞深之所致也犬馬㣲臣慚無寸效䝉荷聖恩優錄特轉今官臣感激自天圖報無地雖盡此生何能仰酬髙厚萬一顧臣不幸陟聞臣母之䘮今奉前因竊思當事不避臣之義也金革無變臣之分也因時之難而他托以自諉臣之所不敢也顧臣犬馬之愚𠂻曲之苦而不敢不哀鳴於君父之前者臣請冒昧言之臣父先臣任翺娶臣嫡母張氏中年無子晩得臣母趙氏又止生臣一人臣任沙河時臣父在家病故臣不及見臣父之終至今痛恨猶幸以為臣之二母在堂得以慈侍及任蘇州時臣母俱以老病侵尋不獲迎養屢得家書臣生母病勢日甚一日彼時即欲陳情求歸縁因㓂勢方張不敢奏請忍心飲痛遂至今日及思臣母號為生臣而寔與無臣等故臣有一官之祿而不獲享其養臣有一命之榮而不獲受其封當其疾也旁無侍藥之人比其卒也歛假他婦之手病軀委榻形影自憐孤柩在堂誰其奠哭每一思之情如剜割即使臣終三年之䘮猶抱終天之恨而又忍情自留則臣無母之人其何敢立於聖明之世耶况臣嫡母在堂今年八十有八夙病纒綿危於朝露聞臣逺出灑淚牽衣不忍釋臣之手夫臣之此身趙生之張容之臣之不孝已誤於趙矣而又安忍復蹈故轍於張哉况今東南㓂勢亦畧少緩當事諸臣又皆悉心幹濟臣之本家上無伯叔下鮮兄弟存者頼以生養死者頼以歸土是臣之此身在外不足以為有無而臣之二母必得臣而後可以有濟也恭惟皇上道髙𤣥極孝廣因心凡在臣工皆得遂其烏鳥之私而安為子之分如臣犬馬之愚𠂻曲之苦號訴無門而不敢不鳴於君父之前者仰頼我皇上髙天厚地之恩有以矜臣之愚憫臣之苦耳乞勅該部再行查訪如果臣言不謬將臣放回原籍俾臣終制則臣舉家幸甚臣愚幸甚臣之感恩圖報又豈此生之所能盡哉臣冐凟天威無任恐懼待罪之至四川道監察御史漳埜李公墓表嘉靖乙夘冬友人李子易持趙安節所撰漳埜李公録泣而謂環曰此先大夫之實錄也龍岡先生既銘壙中矣而未有表諸墓者是不在子耶嗚呼公之徳望在天下聲稱在朝廷而流風遺韻在後學必有能書之者不斐之詞何足為公重獨念鄙生也晩質且闇弱承先君命時及公之門墻受公之益宏矣嗟惟哲人既逺欲往無從誦法昭来後死者事耳是誠在我謹按公諱新芳字元徳别號漳埜世為潞人曽祖璉祖格舉髙年耆徳父清倉副使贈文林郎保定府推官母王氏贈孺人繼楊氏封太孺人𢎞治庚戌七月二十有八日王感異兆而生公性警悟母嘗口授孝經輙成誦七嵗能文不道凢近語辛酉母卒適父客外哀毁骨立歛塟獨能如禮里閈竒之少長以誠意慎獨為學偶志未愜幾於毁生父驚惻委曲成其志其自勵有云事在分中皆可做理根心上不難明又曰身心不可告天地面目如何對聖賢葢以聖賢為必可學而宇宙内事皆其事也丁夘遊郡庠文章行誼卓冠一時初名翰督學公重之為更今諱焉丙子以書魁晋省監試諸公咸以得真才為慶自是從逰者翕然公皆随材鑄就其所奨㧞多見成立登癸未進士衡文者悚然起敬曰此道徳功業之器也授淮安府推官秉公杜託鋤强伸枉撫按委督塩課懋績聞於上優錫禮幣丙戌父卒於官舍悲號扶柩獨脱吕梁之險居䘮盡禮哀如一日戊子服闋補保定府推官視淮政益著當路交薦之友人劉子宸以春試至保定感疾不起公出俸為歛具仍相其柩而歸子以中聘其女人以為難庚寅考最陞戸部主事欽依監徳州糧運悉觧羡餘尚書梁公賢之曰眞亷丈夫也癸巳改四川道監察御史正色立朝風裁凝重危言勁節邈焉寡儔都御史王公稱為眞御史侍郎湛公稱為理學名臣或以我明汲黯及敬軒之後一人者許之人皆以為然按眞定發宄摘奸振揚風紀尤深恤民隠力挽士習勸戒有詞見者化悦歴廣平閲城忽砲震發公驚堕㡬至不免乃䆒縣令而知府李騰霄者力為之觧公疑其有他遂至奏聞當路有擠公者獨将公繫獄年餘放歸後奉詔致仕公貞白性成髙介寡與雖權貴不敢干以私所至寮宷外示敬服而内實忌之甚遭沮抑公亦不以為意也歸田杜門構太虛亭體騐身心静觀造物所學一以孔子為師次惟尊信顔孟於先儒傳註不苟從違其所自得知幾圖權義皆確然至當足俟千古觀者洒然如大夢之得醒也其論世務人品如燭照數計詩文雄渾率關世教至於神竒變化有前人所不能到者賦性剛明御内有禮閨庭肅如也與人交雅尚道誼談論移日畧無怠容望者意消不覺自失其自奉甚約而祭享曲盡誠孝庚子楊母卒歛塟哀毁如所生眷族無告者量周之購田祖壠之側以袝塟族人泰順尹伯考無嗣命以幾承祭仍周其所遺其造詣淵深動履卓越類如此其詳見實錄而其散見則愚所謂必有能書之者兹特其槩云卒於嘉靖庚戌十一月有四日享年六十有一配孫氏慈睦静淑克慎閫儀封孺人子男三長惟中先卒次以中即子易郡學生娶劉氏繼牛氏次以幾郡學生二子學識行業皆足以繼公之後者孫男二人大儒鴻儒孫女四俱以中出所遺有周易大義神易斷意語類好學一元四説知幾愼獨四訓太虛甲子經文集若干葢皆有道之言足傳無疑者以卒之明年辛亥十二月七日塟秋谷山之原為公自卜之兆嗚呼公之生也有自來其出也有所為眞豪傑之士聖賢之徒也䆒其施章章如是當非其㑹耳三代而降儒者之道明於下鄒魯遐矣濓閩諸賢悉皆屈於時而其道至今不廢葢可恃而傳者固在此不在彼也孫松山之稱公有云剛毅似伊川而所造尤圓妙理學並文清而超悟獨驀越後世讀公之書考公之行者當必以斯言為不誣沙河祭名宦文維神宦不同時道乃相似政恤凋衝心勞撫字父母當年師表後世惟兹仲春秋式陳明祀尚饗沙河祭鄉賢文維神昭道樹勲修身範俗曠世同心殊途致一邦家之光來學之式惟兹仲春秋祀崇明徳尚饗祭趙耆老文維公沙陽耆舊太古純良含章遯世徳厚流光秀孕北川維公之子奮跡雲程題名柱史蘭出交芬義方之指抑聞比閭殘夫化徳有司之庭無公之跡僉曰仁人其道乃直我來問俗登公之堂公已抱疾而徒徬徨自信勿藥詎知淪亡鳴呼悲哉徳星殞天哲人萎地世道之衰邦家之厲風木號鳴令人發涕惟兹良辰聊陳薄祭公如有知翻然來至尚饗祭李子秀乃伯文乾坤逸氣江湖偉人聞逹不求於世溪雲乃賁其身親壠若龎公之遺善垂綸等志和之𤣥真篤生良𦙍維國之珍或聲流太學而頓起山林之志或賓作王家而早聨玉牒之姻蘭芳馥馥麟趾振振葢慶餘而知善之積後昌而見公之仁嗟惟我公正宜食子之報福祉無垠胡云順寂而方踰乎七旬嗚呼傷哉華胥之遊勿返倚槐之夢堪嗔雲掩太行兮天慘淡日落漳川兮水潾洵山峙川流兮空萬古穹蒼杳杳兮將誰詢臨風致奠兮不勝其悲悼公如有知兮洋洋其聼陳告天妃文神人相依夷夏有坊海洋羣醜流毒此邦萬井烟消神虚血食堂堂者華獸蹄鳥跡守令之恥江河之羞已仗神威驅之下流執其渠魁黨與未散草不剪根猶恐延蔓謹占兹吉率我貔貅順流東渡取彼猱猴仰祈神慈大賜靈貺假以西颼藉之穏蕩凡我士卒忠勇向前一鼓焚巢以待凱旋倘懐二心臨陣縮怵明受人非幽甘神殛謹告祭徐珮文嗚呼珮也生也食余死也捍余竒懐義抱而孰能如桓桓者夫食焉避難視爾之歸顔有餘汗英魂已矣正氣不磨當為厲鬼殺此羣倭曠野悲風胥江落日老淚如泉匪私爾泣哀哉惜哉惟爾之饗祭毛通府文嗚呼惟天難知士有不死嗟惟先生不幸罹此雄才偉器僅書於鄉政績炳烺十載猶郎一階晋轉而遽淪亡此皆感應之不齊而天道之反常者也世漓道微匪趋斯競範我馳驅動必以正而有遐思後承餘慶可化者先生之形而不朽者先生之行也嗚呼太虚造物其竟何如修短以寸畢歸於初生理苟促而羡年餘然則先生之所得者不已多歟尚饗祭唐尹文人孰無生所貴自樹人孰無死所貴不愧嗟嗟榮邑孤懸海心巧者避之侯來鳴琴甫及下車民歌召父植我柔良鋤彼悍武荒城乆圮鼎築而新方圖西徙以安東人蠢兹倭夷突然蜂起結黨連䑸直犯疆鄙慷慨激烈為士先倡屢有斬俘而氣方張此豈非自樹卓然而於生有光者耶旅無同心寡逢强敵城竇城虧賊縁以入侯忠侯勇挺刃而呼狂奴鋒鏑乃及頭顱隠痛扶傷招民死守蟻聚烏合見敵則走萎焉棄道可殺者身浩然正氣足成者仁彼罔而生不獸則鬼與侯相較何啻千里此豈非雖死不亡而自反無愧者耶國典有常崇褒廕子原爾之心豈願有此烟氛近掃妖壘已空三軍之力厲鬼之功𤣥酒半觴生芻一束臨風洒奠為世道哭尚饗代厚菴宗室祭繼母文嗚呼痛哉烍何不幸而罹如此之顚也憶昔七齡烍母舍烍而不旋也一妺呱呱自謂弱息之難延也幸母氏之聖善劬勞鞠養我以聊全也今又舍我而歸我心其如煎也復遺女弟三寒其誰憐也仰籲悲號植之其惟天也陳詞薦酒將以表微䖍也靈不少留泣血其如漣也岩岩石説滑䑓學宫之後有竒石焉惟巧天出人力不至掌教程近齋樂而玩之命以令名迺作亭於南與二三子遊息其間相對終日若有隱而不發者嗚呼近齋豈好竒歟将玩物歟抑詩人躭詠假此而供興歟或生長吳越飽飫名山北來無此景象蕭索落寞雖得巻塊即相冥契若居空谷者聞人足音而喜歟亦物各有遭待識者而後顯與君偶相得歟噫非然也葢自士以言興實由文䘮漓而不返乆也弊矣近齋思以易之又懼以言而教也故取諸石以垂訓姑使其由象而得意焉耳易以艮為石石者實也近齋以為有其實者不患乎無文二三子亦惟實之務而已是故石之敦敦可以觀仁石之定定可以見性崔而峩維徳不磨峭而直維道壁立峙此而上可以柱朝堂安此而下可以鎮薄俗由此而興雲作雨膏澤可慰乎蒼生以此而砥中流又將障狂瀾廻驚濤震撼撞激不倚而不折也大哉石之時義其輝光之吉乎㫖哉無言之教其後學之思乎又曰石之所以可法者以徳不以形二三子苟徒視其竒竒怪怪者而為剜削雕刻之文視其險阻峻絶者而為艱深詭異之行辭大圭之譽來摧車之評則又貽石之羞而司教者之心愈戚矣有應聲者從而歌南山之詩曰維石岩岩民具爾瞻願師尹有以倡之余謂斯言真砭石也因勒於珉以自厲且告近齋云山海漫談巻二
